
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNSET DI KEBUN- Pembayaran QRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
background:
radial-gradient(circle at top left, rgba(232,255,0,.10), transparent 28%),
radial-gradient(circle at bottom right, rgba(255,79,166,.12), transparent 30%),
linear-gradient(180deg,#0f0f12,#18151f,#111111);
color:#fff;
padding:20px;
min-height:100vh;
}

.container{max-width:700px;margin:auto}

.card{
background:#1a1a1f;
backdrop-filter:blur(16px);
border-radius:24px;
padding:22px;
margin-bottom:18px;
border:2px solid #2d2d35;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.label{
font-size:12px;
color:rgba(255,255,255,.7);
}

.order{
color:#E8FF00;
font-weight:700;
font-size:18px;
}

.total{
font-size:34px;
font-weight:800;
color:#E8FF00;
}

.info{
margin-top:10px;
line-height:1.8;
}

.timer-box{
text-align:center;
margin-bottom:15px;
padding:14px;
border-radius:18px;
background:rgba(255,215,0,.12);
border:1px solid rgba(255,215,0,.25);
}

.timer-title{
font-size:13px;
opacity:.8;
margin-bottom:5px;
}

.timer{
font-size:32px;
font-weight:800;
color:#E8FF00;
}

.qrwrap{text-align:center}

.qr{
display:inline-block;
background:#fff;
padding:16px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.qr img{
width:270px;
display:block;
}

.upload{
border:2px dashed rgba(255,215,0,.4);
padding:25px;
border-radius:20px;
text-align:center;
cursor:pointer;
background:rgba(255,255,255,.05);
}

.result{
display:none;
margin-top:15px;
padding:15px;
background:rgba(255,255,255,.08);
border-radius:14px;
border:1px solid rgba(255,255,255,.1);
}

.ok{
color:#22c55e;
font-weight:700;
margin-top:8px;
}

.confirm{
display:flex;
gap:10px;
margin-top:18px;
}

button{
width:100%;
margin-top:20px;
padding:18px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#E8FF00,#FF4FA6);
color:#111;
font-weight:800;
cursor:pointer;
}

button:disabled{opacity:.4}

.loading{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:99999;
justify-content:center;
align-items:center;
flex-direction:column;
}

.spin{
width:90px;
height:90px;
border:6px solid rgba(255,255,255,.15);
border-top:6px solid #E8FF00;
border-radius:50%;
animation:r 1s linear infinite;
}

@keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:25px">
<img src="logo-event.png" style="max-width:260px;width:100%;">
</div>

<div class="container">

<div class="card">
<div class="label">ORDER ID</div>
<div id="orderId" class="order">-</div><br>

<div class="label">TOTAL PEMBAYARAN</div>
<div id="total" class="total">Rp 0</div>

<div class="info">
<div><b>Jenis Tiket:</b> <span id="jenisTiket">-</span></div>
<div><b>Jumlah Tiket:</b> <span id="jumlahTiket">0</span></div>
<div><b>Nama:</b> <span id="namaPemesan">-</span></div>
<div><b>WhatsApp:</b> <span id="waPemesan">-</span></div>
</div>
</div>

<div class="card qrwrap">

<div class="timer-box">
<div class="timer-title">SELESAIKAN PEMBAYARAN DALAM</div>
<div id="timer" class="timer">03:00</div>
</div>

<div class="qr">
<img src="qris-kebun.png" alt="QRIS">
</div>

</div>

<div class="card">

<label for="file">
<div class="upload">
<h3>Upload Bukti Pembayaran</h3>
<p>Pilih file bukti pembayaran</p>
</div>
</label>

<input id="file" type="file" hidden accept="image/*">

<div id="result" class="result">
<div id="fname"></div>
<div class="ok">✓ Bukti pembayaran berhasil dipilih</div>
</div>

<div class="confirm">
<input type="checkbox" id="cek">
<label for="cek">Saya menyatakan telah melakukan pembayaran dan mengunggah bukti pembayaran yang valid.</label>
</div>

<button id="btn" disabled>KONFIRMASI PEMBAYARAN</button>

</div>

</div>

<div id="loading" class="loading">
<div class="spin"></div>
<h2 style="margin-top:20px">Memproses Pembayaran...</h2>
</div>

<script>

if(!localStorage.getItem('orderId')){
  const d = new Date();
  const y = String(d.getFullYear()).slice(-2);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  const rand = String(Math.floor(Math.random()*1000)).padStart(3,'0');
  localStorage.setItem('orderId', `SDK${y}${m}${day}${rand}`);
}


document.getElementById('orderId').textContent=localStorage.getItem('orderId');

document.getElementById('total').textContent='Rp '+
Number(localStorage.getItem('totalPembayaran')||0).toLocaleString('id-ID');

const items=JSON.parse(localStorage.getItem('checkout_items')||'[]');
const jenis=items.length?items.map(i=>`${i.nama} (${i.qty})`).join(', '):(localStorage.getItem('jenisTiket')||'-');
document.getElementById('jenisTiket').textContent=jenis;
document.getElementById('jumlahTiket').textContent=localStorage.getItem('jumlahTiket')||'0';
document.getElementById('namaPemesan').textContent=localStorage.getItem('nama')||'-';
document.getElementById('waPemesan').textContent=localStorage.getItem('wa')||'-';

let duration=3*60;

function updateTimer(){
const m=Math.floor(duration/60);
const s=duration%60;

document.getElementById('timer').textContent=
String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');

if(duration<=0){
alert('Waktu pembayaran telah habis.');
window.location.href='index.html';
return;
}

duration--;
}

updateTimer();
setInterval(updateTimer,1000);

let uploaded=false;

const file=document.getElementById('file');
const cek=document.getElementById('cek');
const btn=document.getElementById('btn');

function updateBtn(){
btn.disabled=!(uploaded && cek.checked);
}

file.addEventListener('change',()=>{
if(file.files.length){
uploaded=true;
document.getElementById('result').style.display='block';
document.getElementById('fname').textContent='📎 '+file.files[0].name;
updateBtn();
}
});

cek.addEventListener('change',updateBtn);

</script>


<script>
function saveOrder(d){localStorage.setItem('ticketOrder',JSON.stringify(d));}
function loadOrder(){try{return JSON.parse(localStorage.getItem('ticketOrder'))||{};}catch(e){return {};}}
</script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
async function bacaNominalDariGambar(fileObj){
  const { data:{ text } } = await Tesseract.recognize(fileObj,'ind+eng');
  const nums = text.replace(/[^0-9]/g,' ').split(/\s+/)
    .filter(Boolean).map(n=>parseInt(n,10));
  return nums.length ? Math.max(...nums) : null;
}

btn.addEventListener('click', async ()=>{
  document.getElementById('loading').style.display='flex';
  const total = Number(localStorage.getItem('totalPembayaran') || 0);

  try{
    const nominalOCR = await bacaNominalDariGambar(file.files[0]);

    if(nominalOCR !== null && Math.abs(nominalOCR-total) <= 100){
      try{
      const fd=new FormData();
      fd.append("order_id",localStorage.getItem("orderId")||"");
      fd.append("nama",localStorage.getItem("nama")||"");
      fd.append("whatsapp",localStorage.getItem("wa")||"");
      fd.append("jenis_tiket",jenis);
      fd.append("jumlah_tiket",localStorage.getItem("jumlahTiket")||"");
      fd.append("total",localStorage.getItem("totalPembayaran")||"");
      fd.append("bukti",file.files[0]);
      await fetch("https://formspree.io/f/mdarpqar",{method:"POST",body:fd,headers:{Accept:"application/json"}});
      }catch(e){console.error(e);}
      location.href = 'loading.html';
    }else{
      location.href = 'loading.html';
    }
  }catch(err){
    console.error(err);
    location.href = 'loading.html';
  }
});
</script>

</body>
</html>
